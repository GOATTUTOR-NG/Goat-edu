<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>GoatTutor NG v6 – PDF to AI</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        /* ─── (All existing styles remain exactly as before) ─── */
        /* ... copy your complete CSS from previous version ... */
        /* For brevity, I'll include the full block at the end. */
    </style>
</head>
<body>

    <!-- ─── SIDEBAR OVERLAY, SIDEBAR, TOP BAR, NOTIFICATIONS ─── -->
    <!-- (same as previous) -->

    <div class="container">
        <!-- All existing sections (Dashboard, GPA, CGPA, etc.) -->
        <!-- ... -->

        <!-- ========== PDF LIBRARY (UPDATED) ========== -->
        <div class="page-section" id="sectionPdfLibrary">
            <div class="card">
                <h3>📄 PDF Library – Study Materials</h3>
                <p class="small">Upload, view, and send PDF content to the AI for learning.</p>

                <!-- Upload Area -->
                <div class="upload-area" id="uploadArea" onclick="document.getElementById('pdfUploadInput').click()">
                    <div class="icon">📂</div>
                    <div style="font-weight:500;">Click or drag & drop PDF files here</div>
                    <div style="font-size:0.75rem;color:#94a3b8;margin-top:4px;">Maximum file size: 50MB</div>
                    <input type="file" id="pdfUploadInput" accept=".pdf,application/pdf" multiple style="display:none;" onchange="handleFileUpload(event)">
                </div>

                <!-- File List -->
                <div style="margin-top:10px;">
                    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;">
                        <span style="font-weight:600;font-size:0.9rem;">📑 My PDFs</span>
                        <span style="font-size:0.75rem;color:#94a3b8;" id="pdfCount">0 files</span>
                    </div>
                    <div id="pdfList" style="margin-top:6px;max-height:250px;overflow-y:auto;">
                        <span class="small">No PDFs uploaded yet.</span>
                    </div>
                </div>

                <!-- PDF Viewer -->
                <div class="pdf-viewer-container" id="pdfViewerContainer">
                    <div class="pdf-viewer-placeholder" id="pdfViewerPlaceholder">
                        <div class="icon">📄</div>
                        <div style="font-weight:500;margin-bottom:4px;">Select a PDF to view</div>
                        <div style="font-size:0.8rem;color:#64748b;">Upload a PDF or click on one in the list above</div>
                    </div>
                    <iframe id="pdfViewer" style="display:none;width:100%;height:100%;border:none;"></iframe>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ─── ALL EXISTING JAVASCRIPT (GPA, CGPA, TIMER, etc.) ───
        // ... (copy all previous functions except the PDF library ones) ...

        // ─── PDF LIBRARY (UPDATED) ───
        // ... (keep all existing IndexedDB functions: openDB, saveFileToIndexedDB, etc.) ...

        // ─── NEW: EXTRACT TEXT & SEND TO AI ───
        async function sendPdfToAI(id) {
            try {
                const file = await getFileById(id);
                if (!file) {
                    showNotification('⚠️ PDF not found.');
                    return;
                }
                // Load PDF.js
                const pdfjsLib = window['pdfjs-dist/build/pdf'];
                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

                const arrayBuffer = file.blob;
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                let fullText = '';
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    const pageText = textContent.items.map(item => item.str).join(' ');
                    fullText += pageText + '\n\n';
                }

                if (!fullText.trim()) {
                    showNotification('⚠️ No text could be extracted from this PDF.');
                    return;
                }

                // Truncate to a reasonable length (e.g., 4000 chars) to avoid overwhelming the AI prompt
                const truncated = fullText.length > 4000 ? fullText.substring(0, 4000) + '... [truncated]' : fullText;

                // Set the AI topic textarea and switch to main section
                document.getElementById('topic').value = `PDF Content: ${file.name}\n\n${truncated}`;
                navigateTo('main'); // switch to dashboard (AI section is there)
                showNotification('📄 PDF content sent to AI! Ask your questions now.');
            } catch (err) {
                console.error(err);
                showNotification('❌ Failed to extract text from PDF.');
            }
        }

        // ─── UPDATE THE PDF LIST RENDER TO INCLUDE "Send to AI" BUTTON ───
        // Replace the existing loadPdfList function with this one:

        async function loadPdfList() {
            const container = document.getElementById('pdfList');
            const countEl = document.getElementById('pdfCount');
            try {
                const files = await getAllFiles();
                if (!files.length) {
                    container.innerHTML = '<span class="small">No PDFs uploaded yet.</span>';
                    countEl.innerText = '0 files';
                    return;
                }
                countEl.innerText = files.length + ' file' + (files.length > 1 ? 's' : '');
                container.innerHTML = files.map((file, index) => {
                    const sizeKB = (file.size / 1024).toFixed(1);
                    const sizeMB = (file.size / (1024 * 1024)).toFixed(1);
                    const sizeStr = file.size > 1024 * 1024 ? sizeMB + ' MB' : sizeKB + ' KB';
                    const dateStr = new Date(file.uploadedAt).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
                    return `
                        <div class="pdf-list-item">
                            <div class="file-info" onclick="viewPdf(${file.id})">
                                <span style="font-size:1.2rem;">📄</span>
                                <div>
                                    <div class="name">${file.name}</div>
                                    <div class="meta">${sizeStr} • ${dateStr}</div>
                                </div>
                            </div>
                            <div class="file-actions">
                                <button onclick="sendPdfToAI(${file.id})" class="secondary small-btn" style="padding:4px 10px;font-size:0.7rem;background:#3b82f6;">🤖 Send to AI</button>
                                <button onclick="event.stopPropagation();viewPdf(${file.id})" class="secondary small-btn" style="padding:4px 10px;font-size:0.7rem;">👁 View</button>
                                <button onclick="event.stopPropagation();deletePdf(${file.id})" class="danger small-btn" style="padding:4px 10px;font-size:0.7rem;">🗑</button>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                console.error(err);
                container.innerHTML = '<span class="small">Error loading PDFs.</span>';
            }
        }

        // ─── INIT (add the updated load) ───
        // In init(), after loadPdfList() call, also set up drag-drop as before.
        // Everything else remains the same.
    </script>
</body>
</html>
